<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>y-mxgraph Demo</title>
  <style>
    /* ── 页面骨架 ── */
    html,
    body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #ffffff;
      color: #333333;
    }

    /* ── 顶部工具栏（仅作用于 #toolbar 内部） ── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: #f8f9fa;
      border-bottom: 1px solid #dee2e6;
      flex-shrink: 0;
      flex-wrap: wrap;
      box-sizing: border-box;
    }

    #toolbar h1 {
      font-size: 15px;
      font-weight: 600;
      color: #2563eb;
      white-space: nowrap;
      margin: 0;
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #toolbar label {
      font-size: 12px;
      color: #6c757d;
      white-space: nowrap;
    }

    #toolbar select,
    #toolbar input[type="text"] {
      background: #ffffff;
      border: 1px solid #ced4da;
      color: #333333;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 12px;
      outline: none;
      box-sizing: border-box;
    }

    #toolbar select:focus,
    #toolbar input[type="text"]:focus {
      border-color: #2563eb;
    }

    #room-input {
      width: 120px;
    }

    #custom-url-input {
      width: 220px;
    }

    .separator {
      width: 1px;
      height: 20px;
      background: #dee2e6;
      flex-shrink: 0;
    }

    /* ── 状态栏 ── */
    #status-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 4px 16px;
      background: #f8f9fa;
      border-bottom: 1px solid #dee2e6;
      font-size: 11px;
      color: #6c757d;
      flex-shrink: 0;
      box-sizing: border-box;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #adb5bd;
      display: inline-block;
      margin-right: 4px;
      flex-shrink: 0;
    }

    .status-dot.connected {
      background: #22c55e;
    }

    .status-dot.loading {
      background: #f59e0b;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    /* ── draw.io 宿主区域 ── */
    #drawio-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
      min-height: 0;
    }

    /* draw.io 把自身 (geEditor) 挂在此容器内，作为 grid 容器 */
    #drawio-container {
      position: absolute;
      inset: 0;
    }

    /* ── 加载遮罩 ── */
    #loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      gap: 16px;
      z-index: 100;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e9ecef;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #loading-overlay p {
      font-size: 13px;
      color: #6c757d;
      margin: 0;
    }
  </style>
</head>

<body>
  <div id="toolbar">
    <h1>y-mxgraph Demo</h1>
    <div class="separator"></div>

    <div class="toolbar-group">
      <label>draw.io 版本:</label>
      <select id="version-select">
        <option value="latest">latest</option>
        <option value="29.7.9">v29.7.9</option>
        <option value="28.2.9">v28.2.9</option>
        <option value="27.1.6">v27.1.6</option>
        <option value="26.2.15">v26.2.15</option>
        <option value="custom">自定义 URL...</option>
      </select>
    </div>

    <div class="toolbar-group" id="custom-url-group" style="display:none">
      <input type="text" id="custom-url-input" placeholder="https://..." />
    </div>

    <div class="separator"></div>

    <div class="toolbar-group">
      <label>Room:</label>
      <input type="text" id="room-input" value="y-mxgraph-demo" />
    </div>
  </div>

  <div id="status-bar">
    <span><span class="status-dot" id="drawio-dot"></span>draw.io: <span id="drawio-status">未加载</span></span>
    <span><span class="status-dot" id="collab-dot"></span>协作: <span id="collab-status">未连接</span></span>
    <span id="peer-count" style="display:none">在线: <strong id="peer-num">1</strong> 人</span>
  </div>

  <div id="drawio-wrapper">
    <div id="loading-overlay">
      <div class="spinner"></div>
      <p>正在加载 draw.io...</p>
    </div>
    <div id="drawio-container">
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
