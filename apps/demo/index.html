<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>y-mxgraph Demo</title>
  <style>
    /* ── 页面骨架 ── */
    html,
    body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #ffffff;
      color: #333333;
    }

    /* ── 顶部工具栏（仅作用于 #toolbar 内部） ── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: #f8f9fa;
      border-bottom: 1px solid #dee2e6;
      flex-shrink: 0;
      flex-wrap: wrap;
      box-sizing: border-box;
    }

    #toolbar h1 {
      font-size: 15px;
      font-weight: 600;
      color: #2563eb;
      white-space: nowrap;
      margin: 0;
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #toolbar label {
      font-size: 12px;
      color: #6c757d;
      white-space: nowrap;
    }

    #toolbar select,
    #toolbar input[type="text"] {
      background: #ffffff;
      border: 1px solid #ced4da;
      color: #333333;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 12px;
      outline: none;
      box-sizing: border-box;
    }

    #toolbar select:focus,
    #toolbar input[type="text"]:focus {
      border-color: #2563eb;
    }

    #room-input {
      width: 120px;
    }

    #custom-url-input {
      width: 220px;
    }

    .separator {
      width: 1px;
      height: 20px;
      background: #dee2e6;
      flex-shrink: 0;
    }

    /* ── 状态栏 ── */
    #status-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 4px 16px;
      background: #f8f9fa;
      border-bottom: 1px solid #dee2e6;
      font-size: 11px;
      color: #6c757d;
      flex-shrink: 0;
      box-sizing: border-box;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #adb5bd;
      display: inline-block;
      margin-right: 4px;
      flex-shrink: 0;
    }

    .status-dot.connected {
      background: #22c55e;
    }

    .status-dot.loading {
      background: #f59e0b;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    /* ── 主容器 ── */
    #main-container {
      display: flex;
      flex: 1;
      gap: 0;
      min-height: 0;
    }

    /* ── draw.io 宿主区域 ── */
    #drawio-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
      min-height: 0;
      border-right: 1px solid #dee2e6;
    }

    /* draw.io 把自身 (geEditor) 挂在此容器内，作为 grid 容器 */
    #drawio-container {
      position: absolute;
      inset: 0;
    }

    /* ── 调试面板 ── */
    #debug-panel {
      display: flex;
      flex-direction: column;
      width: 280px;
      flex-shrink: 0;
      background: #fafafa;
      border-left: 1px solid #dee2e6;
      overflow: hidden;
    }

    #debug-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: #f1f3f5;
      border-bottom: 1px solid #dee2e6;
      font-size: 12px;
      font-weight: 600;
      color: #495057;
    }

    #debug-panel-clear {
      background: #e7f5ff;
      color: #1971c2;
      border: none;
      border-radius: 3px;
      padding: 4px 8px;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #debug-panel-clear:hover {
      background: #d0ebff;
    }

    #y-mxgraph-debug-log {
      flex: 1;
      overflow-y: auto;
      font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
      font-size: 11px;
      background: #ffffff;
      color: #495057;
      padding: 0;
      margin: 0;
    }

    #y-mxgraph-debug-log div {
      background: #ffffff;
    }

    #y-mxgraph-debug-log div:nth-child(even) {
      background: #f9f9f9;
    }

    /* ── 加载遮罩 ── */
    #loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      gap: 16px;
      z-index: 100;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e9ecef;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #loading-overlay p {
      font-size: 13px;
      color: #6c757d;
      margin: 0;
    }

    #loading-steps {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 12px;
      color: #adb5bd;
    }

    .loading-step {
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.2s;
    }

    .loading-step.active {
      color: #2563eb;
      font-weight: 500;
    }

    .loading-step.done {
      color: #22c55e;
    }

    .loading-step .step-icon {
      width: 14px;
      text-align: center;
      font-size: 13px;
      flex-shrink: 0;
    }
  </style>
</head>

<body>
  <div id="toolbar">
    <h1>y-mxgraph Demo</h1>
    <div class="separator"></div>

    <div class="toolbar-group">
      <label id="label-version">draw.io version:</label>
      <select id="version-select">
        <option value="latest">latest</option>
        <option value="29.7.9">v29.7.9</option>
        <option value="28.2.9">v28.2.9</option>
        <option value="27.1.6">v27.1.6</option>
        <option value="26.2.15">v26.2.15</option>
        <option value="custom">Custom URL...</option>
      </select>
    </div>

    <div class="toolbar-group" id="custom-url-group" style="display:none">
      <input type="text" id="custom-url-input" placeholder="https://..." />
    </div>

    <div class="separator"></div>

    <div class="toolbar-group">
      <label id="label-room">Room:</label>
      <input type="text" id="room-input" value="y-mxgraph-demo" />
    </div>
  </div>

  <div id="status-bar">
    <span><span class="status-dot" id="drawio-dot"></span><span id="label-drawio">draw.io: </span><span
        id="drawio-status">Not loaded</span></span>
    <span><span class="status-dot" id="collab-dot"></span><span id="label-collab">Collab: </span><span
        id="collab-status">Disconnected</span></span>
    <span id="peer-count" style="display:none"><span id="label-online">Online: </span><strong
        id="peer-num">1</strong></span>
  </div>

  <div id="main-container">
    <div id="drawio-wrapper">
      <div id="loading-overlay">
        <div class="spinner"></div>
        <p id="loading-text">Loading draw.io...</p>
        <div id="loading-steps">
          <div class="loading-step" id="step-preconfig">
            <span class="step-icon">○</span>
            <span>Loading PreConfig.js</span>
          </div>
          <div class="loading-step" id="step-app">
            <span class="step-icon">○</span>
            <span>Loading editor (app.min.js)</span>
          </div>
          <div class="loading-step" id="step-init">
            <span class="step-icon">○</span>
            <span>Initializing editor</span>
          </div>
        </div>
      </div>
      <div id="drawio-container">
      </div>
    </div>

    <div id="debug-panel">
      <div id="debug-panel-header">
        <span>Y.Doc Updates</span>
        <button id="debug-panel-clear">Clear</button>
      </div>
      <div id="y-mxgraph-debug-log"></div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
