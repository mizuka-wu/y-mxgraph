<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>y-mxgraph Demo</title>
  <style>
    /* ── 页面骨架 ── */
    html,
    body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #ffffff;
      color: #333333;
    }

    /* ── 顶部工具栏（仅作用于 #toolbar 内部） ── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: #f8f9fa;
      border-bottom: 1px solid #dee2e6;
      flex-shrink: 0;
      flex-wrap: wrap;
      box-sizing: border-box;
    }

    #toolbar h1 {
      font-size: 15px;
      font-weight: 600;
      color: #2563eb;
      white-space: nowrap;
      margin: 0;
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #toolbar label {
      font-size: 12px;
      color: #6c757d;
      white-space: nowrap;
    }

    #toolbar select,
    #toolbar input[type="text"] {
      background: #ffffff;
      border: 1px solid #ced4da;
      color: #333333;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 12px;
      outline: none;
      box-sizing: border-box;
    }

    #toolbar select:focus,
    #toolbar input[type="text"]:focus {
      border-color: #2563eb;
    }

    #room-input {
      width: 120px;
    }

    #custom-url-input {
      width: 220px;
    }

    .separator {
      width: 1px;
      height: 20px;
      background: #dee2e6;
      flex-shrink: 0;
    }

    /* ── 工具按钮 ── */
    .tool-btn {
      background: #e7f5ff;
      color: #1971c2;
      border: none;
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .tool-btn:hover {
      background: #d0ebff;
    }

    .tool-btn:disabled {
      background: #e9ecef;
      color: #adb5bd;
      cursor: not-allowed;
    }

    .tool-btn.danger {
      background: #fff5f5;
      color: #c92a2a;
    }

    .tool-btn.danger:hover {
      background: #ffc9c9;
    }

    /* ── 对比结果面板 ── */
    #compare-panel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 560px;
      max-width: 90vw;
      max-height: 80vh;
      background: #ffffff;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      display: none;
      flex-direction: column;
      z-index: 200;
      overflow: hidden;
    }

    #compare-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #f1f3f5;
      border-bottom: 1px solid #dee2e6;
      font-size: 14px;
      font-weight: 600;
      color: #495057;
    }

    #compare-panel-close {
      background: none;
      border: none;
      font-size: 18px;
      color: #868e96;
      cursor: pointer;
      line-height: 1;
    }

    #compare-panel-close:hover {
      color: #495057;
    }

    #compare-panel-body {
      padding: 16px;
      overflow-y: auto;
      font-size: 12px;
      font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
      color: #495057;
    }

    #compare-panel-body table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 12px;
    }

    #compare-panel-body th,
    #compare-panel-body td {
      border: 1px solid #dee2e6;
      padding: 6px 10px;
      text-align: left;
    }

    #compare-panel-body th {
      background: #f8f9fa;
      font-weight: 600;
    }

    #compare-panel-body .diff-mismatch {
      color: #e03131;
      font-weight: 600;
    }

    #compare-panel-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      display: none;
      z-index: 199;
    }

    /* ── 状态栏 ── */
    #status-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 4px 16px;
      background: #f8f9fa;
      border-bottom: 1px solid #dee2e6;
      font-size: 11px;
      color: #6c757d;
      flex-shrink: 0;
      box-sizing: border-box;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #adb5bd;
      display: inline-block;
      margin-right: 4px;
      flex-shrink: 0;
    }

    .status-dot.connected {
      background: #22c55e;
    }

    .status-dot.loading {
      background: #f59e0b;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    /* ── 主容器 ── */
    #main-container {
      display: flex;
      flex: 1;
      gap: 0;
      min-height: 0;
    }

    /* ── draw.io 宿主区域 ── */
    #drawio-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
      min-height: 0;
    }

    /* draw.io 把自身 (geEditor) 挂在此容器内，作为 grid 容器 */
    #drawio-container {
      position: absolute;
      inset: 0;
    }

    /* ── 调试面板 ── */
    #debug-panel {
      display: flex;
      flex-direction: column;
      width: 280px;
      flex-shrink: 0;
      background: #fafafa;
      border-left: 1px solid #dee2e6;
      overflow: hidden;
    }

    #debug-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: #f1f3f5;
      border-bottom: 1px solid #dee2e6;
      font-size: 12px;
      font-weight: 600;
      color: #495057;
    }

    #debug-panel-clear {
      background: #e7f5ff;
      color: #1971c2;
      border: none;
      border-radius: 3px;
      padding: 4px 8px;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #debug-panel-clear:hover {
      background: #d0ebff;
    }

    #y-mxgraph-debug-log {
      flex: 1;
      overflow-y: auto;
      font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
      font-size: 11px;
      background: #ffffff;
      color: #495057;
      padding: 0;
      margin: 0;
    }

    #y-mxgraph-debug-log div {
      background: #ffffff;
    }

    #y-mxgraph-debug-log div:nth-child(even) {
      background: #f9f9f9;
    }

    /* ── 加载遮罩 ── */
    #loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      gap: 16px;
      z-index: 100;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e9ecef;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #loading-overlay p {
      font-size: 13px;
      color: #6c757d;
      margin: 0;
    }

    #loading-steps {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 12px;
      color: #adb5bd;
    }

    .loading-step {
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.2s;
    }

    .loading-step.active {
      color: #2563eb;
      font-weight: 500;
    }

    .loading-step.done {
      color: #22c55e;
    }

    .loading-step .step-icon {
      width: 14px;
      text-align: center;
      font-size: 13px;
      flex-shrink: 0;
    }
  </style>
</head>

<body>
  <div id="toolbar">
    <h1>y-mxgraph Demo</h1>
    <div class="separator"></div>

    <div class="toolbar-group">
      <label id="label-version">draw.io version:</label>
      <select id="version-select">
        <option value="latest">latest</option>
        <option value="29.7.9">v29.7.9</option>
        <option value="28.2.9">v28.2.9</option>
        <option value="27.1.6">v27.1.6</option>
        <option value="26.2.15">v26.2.15</option>
        <option value="custom">Custom URL...</option>
      </select>
    </div>

    <div class="toolbar-group" id="custom-url-group" style="display:none">
      <input type="text" id="custom-url-input" placeholder="https://..." />
    </div>

    <div class="separator"></div>

    <div class="toolbar-group">
      <label id="label-room">Room:</label>
      <input type="text" id="room-input" value="y-mxgraph-demo" />
    </div>

    <div class="separator"></div>

    <div class="toolbar-group">
      <button class="tool-btn" id="btn-export-xml" title="下载当前 Y.Doc 序列化后的 XML">导出 Y.Doc XML</button>
      <button class="tool-btn" id="btn-compare-xml" title="上传 XML 并与当前 Y.Doc 对比统计信息">上传 XML 对比</button>
      <input type="file" id="xml-upload-input" accept=".xml" style="display:none" />
    </div>

    <div class="separator"></div>

    <div class="toolbar-group">
      <button class="tool-btn danger" id="btn-delete-cells" title="从 Y.Doc 中删除 cell 0 和 cell 1，触发自动恢复">模拟删除 Cell 0/1</button>
      <button class="tool-btn" id="btn-reset-ydoc" title="从 file.data 强制重建 ydoc（止损失效时的手动恢复）">从 file 重建 ydoc</button>
    </div>

    <div class="separator"></div>

    <div class="toolbar-group">
      <button class="tool-btn danger" id="btn-corrupt-order-dup" title="在 cellsOrder 中插入重复 id">order 重复</button>
      <button class="tool-btn danger" id="btn-corrupt-ghost-id" title="在 cellsOrder 中加入 map 不存在的 id">幽灵 id</button>
      <button class="tool-btn danger" id="btn-corrupt-map-orphan" title="在 cellsMap 中加 cell 但不加到 order">map 孤儿</button>
      <button class="tool-btn danger" id="btn-corrupt-parent-break" title="让某个 cell 的 parent 指向不存在的 id">parent 断裂</button>
      <button class="tool-btn" id="btn-validate-integrity" title="调用 validateDocIntegrity 校验并自愈">验证完整性</button>
      <button class="tool-btn danger" id="btn-corrupt-diagram-dup" title="在 diagramOrder 中插入重复 diagram id">diagram 重复</button>
      <button class="tool-btn danger" id="btn-corrupt-diagram-ghost" title="在 diagramOrder 中加入 map 不存在的 diagram id">diagram 幽灵</button>
      <button class="tool-btn danger" id="btn-corrupt-diagram-orphan" title="在 diagram map 中加 diagram 但不加到 order">diagram 孤儿</button>
    </div>
  </div>

  <div id="status-bar">
    <span><span class="status-dot" id="drawio-dot"></span><span id="label-drawio">draw.io: </span><span
        id="drawio-status">Not loaded</span></span>
    <span><span class="status-dot" id="collab-dot"></span><span id="label-collab">Collab: </span><span
        id="collab-status">Disconnected</span></span>
    <span id="peer-count" style="display:none"><span id="label-online">Online: </span><strong
        id="peer-num">1</strong></span>
  </div>

  <div id="main-container">
    <div id="drawio-wrapper">
      <div id="loading-overlay">
        <div class="spinner"></div>
        <p id="loading-text">Loading draw.io...</p>
        <div id="loading-steps">
          <div class="loading-step" id="step-preconfig">
            <span class="step-icon">○</span>
            <span>Loading PreConfig.js</span>
          </div>
          <div class="loading-step" id="step-app">
            <span class="step-icon">○</span>
            <span>Loading editor (app.min.js)</span>
          </div>
          <div class="loading-step" id="step-init">
            <span class="step-icon">○</span>
            <span>Initializing editor</span>
          </div>
        </div>
      </div>
      <div id="drawio-container">
      </div>
    </div>


  </div>

  <!-- 对比结果面板 -->
  <div id="compare-panel-overlay"></div>
  <div id="compare-panel">
    <div id="compare-panel-header">
      <span>XML 对比结果</span>
      <button id="compare-panel-close">&times;</button>
    </div>
    <div id="compare-panel-body"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
