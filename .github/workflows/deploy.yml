name: Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # 1. Build the library (docs and demo both depend on it)
      - run: pnpm --filter y-mxgraph build

      # 2. Build docs (outputs to apps/docs/docs/.vitepress/dist)
      - run: pnpm --filter @y-mxgraph/docs build

      # 3. Build demo with base path /y-mxgraph/demo/
      - run: pnpm --filter @y-mxgraph/demo build
        env:
          VITE_BASE: /y-mxgraph/demo/

      # 4. Move demo dist into docs dist as a subdirectory
      - name: Merge demo into docs output
        run: |
          mkdir -p apps/docs/docs/.vitepress/dist/demo
          cp -r apps/demo/dist/. apps/docs/docs/.vitepress/dist/demo/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
