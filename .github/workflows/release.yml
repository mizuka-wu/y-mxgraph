name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter y-mxgraph build

      - name: Package dist
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd packages/y-mxgraph/dist
          zip -r "../y-mxgraph-${{ github.ref_name }}.zip" .

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/')
        id: changelog
        uses: requarks/changelog-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          writeToFile: false
        continue-on-error: true

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          release_notes="${{ steps.changelog.outputs.changes }}"
          if [ -z "$release_notes" ]; then
            release_notes="⚠️ 自动生成 release notes 失败（多为首次发布、只有一个 tag 或仓库未完整同步 tag），请手动查看提交历史。"
          fi
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --notes "$release_notes" \
            "packages/y-mxgraph/y-mxgraph-${{ github.ref_name }}.zip"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: |
          cd packages/y-mxgraph/dist
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
