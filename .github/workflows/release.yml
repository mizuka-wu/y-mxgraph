name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter y-mxgraph build

      - name: Package dist
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd packages/y-mxgraph/dist
          zip -r "../y-mxgraph-${{ github.ref_name }}.zip" .

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          npx conventional-changelog -p angular -r 2 -o release-notes.md || \
          echo "⚠️ Failed to generate changelog, using fallback." > release-notes.md

      - name: Create or update GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          ASSETS="packages/y-mxgraph/y-mxgraph-${{ github.ref_name }}.zip"
          if gh release view "${{ github.ref_name }}" &>/dev/null; then
            echo "Release exists, deleting and recreating..."
            gh release delete "${{ github.ref_name }}" --yes
          fi
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --notes-file release-notes.md \
            "$ASSETS"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: |
          cd packages/y-mxgraph/dist
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
