name: CI

on:
  push:
    branches: [main, master, "fix/*"]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build library
        run: pnpm --filter y-mxgraph build

      - name: Run y-mxgraph tests
        run: pnpm --filter y-mxgraph test

      - name: Run iframe-bridge tests
        run: pnpm --filter @y-mxgraph/iframe-bridge test

      - name: Type check y-mxgraph
        run: pnpm --filter y-mxgraph exec tsc --noEmit

      - name: Type check iframe-bridge
        run: pnpm --filter @y-mxgraph/iframe-bridge exec tsc --noEmit
